# MISRA C 2023 (for C files)
misra-c-2023=all

# Enable all rule categories for C
misra-c-2023.required=all
misra-c-2023.mandatory=all
misra-c-2023.advisory=all

# Enable MISRA C++ 2008
misra-cpp-2008=all

# Enable all rule categories for C++
misra-cpp-2008.required=all
misra-cpp-2008.mandatory=all
misra-cpp-2008.advisory=all

# Enable modern C++ checks that align with MISRA C++ 2023
# These cover C++11, C++14, and C++17 features
analysis-mode=GA:1,2,3,4

# Enable all modern C++ checks
enable-all=modern

# Specific modern C++ checks that align with MISRA C++ 2023 principles
enable=smart-pointers
enable=move-semantics
enable=constexpr
enable=noexcept
enable=nullptr
enable=override
enable=final
enable=auto

# Set severity for MISRA rules
severity.V25xx=high
severity.V26xx=high

# Future: When MISRA C++ 2023 is fully supported
# misra-cpp-2023=all
# misra-cpp-2023.required=all
# misra-cpp-2023.mandatory=all
# misra-cpp-2023.advisory=all
# misra-cpp-2023.rule=V2700-V2799
