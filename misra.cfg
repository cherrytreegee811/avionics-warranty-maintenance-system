# MISRA C 2023 (for C files)
# Enforce only required/mandatory categories.
misra-c-2023.required=all
misra-c-2023.mandatory=all

# MISRA C++ 2008
# Enforce only required/mandatory categories.
misra-cpp-2008.required=all
misra-cpp-2008.mandatory=all

# Set severity for MISRA rules (useful for report viewers).
severity.V25xx=high
severity.V26xx=high
severity.V30xx=high

# Future: When MISRA C++ 2023 is fully supported
# misra-cpp-2023=all
# misra-cpp-2023.required=all
# misra-cpp-2023.mandatory=all
# misra-cpp-2023.advisory=all
# misra-cpp-2023.rule=V2700-V2799
