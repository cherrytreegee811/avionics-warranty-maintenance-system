name: PVS-Studio build analysis
on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development
  workflow_dispatch:
jobs:
  build-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: "**/cpm_modules"
          key: ${{ github.workflow }}-cpm-modules-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
      
      - name: Install tools + configure PVS license
        env:
          PVS_STUDIO_CREDENTIALS: ${{ secrets.PVS_STUDIO_CREDENTIALS }}
        run: |
          sudo apt update
          sudo apt install -y wget gnupg jq

          # Configure PVS-Studio APT repo key (apt-key is deprecated on modern Ubuntu).
          sudo install -m 0755 -d /etc/apt/keyrings
          wget -q -O - https://files.pvs-studio.com/etc/pubkey.txt \
            | gpg --dearmor \
            | sudo tee /etc/apt/keyrings/pvs-studio.gpg > /dev/null
          sudo chmod a+r /etc/apt/keyrings/pvs-studio.gpg

          wget -q -O /tmp/viva64.list https://files.pvs-studio.com/etc/viva64.list
