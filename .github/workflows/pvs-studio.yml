          sudo apt update
          sudo apt install -y pvs-studio

          if [ -z "$PVS_STUDIO_CREDENTIALS" ]; then
            echo "PVS-Studio credentials secret (PVS_STUDIO_CREDENTIALS) is not set; skipping analysis." >&2
            echo "PVS_ANALYZE=0" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "PVS_ANALYZE=1" >> "$GITHUB_ENV"

          # Prefer the official 2-arg form: credentials <email> <key>.
          # If the secret is a single string with whitespace/newlines, split it.
          CLEANED=$(printf '%s' "$PVS_STUDIO_CREDENTIALS" | tr '\n\r\t' '   ')
          read -r PVS_EMAIL PVS_KEY PVS_EXTRA <<< "$CLEANED"
          if [ -n "$PVS_EMAIL" ] && [ -n "$PVS_KEY" ] && [ -z "$PVS_EXTRA" ]; then
            pvs-studio-analyzer credentials "$PVS_EMAIL" "$PVS_KEY"
          else
            # Fallback for legacy single-argument secret formats.
            pvs-studio-analyzer credentials "$PVS_STUDIO_CREDENTIALS"
          fi

          LIC_FILE="$HOME/.config/PVS-Studio/PVS-Studio.lic"
          if [ ! -s "$LIC_FILE" ]; then
            echo "PVS-Studio license file was not created at $LIC_FILE" >&2
            ls -la "$HOME/.config/PVS-Studio" || true
            exit 1
          fi
      
      - name: Build
        run: |
          cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=On -B build .
          cmake --build build -j4

      - name: Create scoped compilation database (source/ only)
        run: |
          jq --arg root "${{ github.workspace }}" \
            '[.[] | select(.file | startswith($root + "/source/"))]' \
            build/compile_commands.json > build/compile_commands.project.json
          COUNT=$(jq 'length' build/compile_commands.project.json)
          echo "Scoped translation units: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "No translation units matched /source/." >&2
            exit 1
          fi
      
      - name: Analyze
        if: env.PVS_ANALYZE == '1'
        run: |
          pvs-studio-analyzer analyze \
            -f build/compile_commands.project.json \
            -j0 \
            -o pvs-studio.log \
            --analysis-mode MISRA \
            --exclude-path "${{ github.workspace }}/build/_deps" \
            --exclude-path "${{ github.workspace }}/cpm_modules" \
            --exclude-path "${{ github.workspace }}/build/CMakeFiles" \
            --rules-config misra.cfg

      - name: Convert + gate on MISRA required/mandatory
        if: env.PVS_ANALYZE == '1'
        run: |
          mkdir -p pvs-report

          set +e
          plog-converter \
            -a 'MISRA:1,2' \
            -t json \
            -t sarif \
            -t fullhtml \
            -o pvs-report \
            -n pvs-misra \
            -w \
            pvs-studio.log
          STATUS=$?
          set -e

          echo "PLOG_CONVERTER_EXIT_CODE=$STATUS" >> "$GITHUB_ENV"
          echo "plog-converter exit code: $STATUS"

          if [ "$STATUS" -ne 0 ] && [ "$STATUS" -ne 2 ]; then
            echo "plog-converter failed (exit code $STATUS)." >&2
            exit 1
          fi

      - name: Upload PVS-Studio artifacts
        if: always() && env.PVS_ANALYZE == '1'
        uses: actions/upload-artifact@v4
        with:
          name: pvs-studio-report
          path: |
            pvs-studio.log
            pvs-report/

      - name: Fail if MISRA required/mandatory violations exist
        if: always() && env.PVS_ANALYZE == '1'
        run: |
          if [ "${PLOG_CONVERTER_EXIT_CODE:-0}" -eq 2 ]; then
            echo "❌ Build failed: MISRA required/mandatory violations present"
            exit 1
          fi

          echo "✅ MISRA required/mandatory gate passed"
