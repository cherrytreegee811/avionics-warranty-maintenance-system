name: PVS-Studio build analysis
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
jobs:
  build-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: "**/cpm_modules"
          key: ${{ github.workflow }}-cpm-modules-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
      
      - name: Install tools
        run: |
          wget -q -O - https://files.pvs-studio.com/etc/pubkey.txt \
            | sudo apt-key add -
          sudo wget -O /etc/apt/sources.list.d/viva64.list \
            https://files.pvs-studio.com/etc/viva64.list
          sudo apt update
          sudo apt install pvs-studio
          pvs-studio-analyzer credentials ${{ secrets.PVS_STUDIO_CREDENTIALS }}
      
      - name: Build
        run: |
          cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=On -B build .
          cmake --build build -j4
      
      - name: Analyze
        run: |
          pvs-studio-analyzer analyze \
            -f build/compile_commands.json \
            -j \
            -o pvs-studio.log \
            --rules-config misra.cfg
      
      - name: Filter MISRA warnings
        run: |
          # Count total warnings
          TOTAL_WARNINGS=$(wc -l < pvs-studio.log 2>/dev/null || echo "0")
          echo "Total PVS-Studio warnings: $TOTAL_WARNINGS"
          
          # Filter MISRA C 2023 warnings (V30xx range)
          grep -E "V30[0-9][0-9]" pvs-studio.log > misra-c-2023.log 2>/dev/null || true
          C_WARNINGS=$(wc -l < misra-c-2023.log 2>/dev/null || echo "0")
          
          # Filter MISRA C++ 2008 warnings (V25xx, V26xx)
          grep -E "V(25[0-9][0-9]|26[0-9][0-9])" pvs-studio.log > misra-cpp-2008.log 2>/dev/null || true
          CPP_WARNINGS=$(wc -l < misra-cpp-2008.log 2>/dev/null || echo "0")
          
          echo "MISRA C 2023 violations: $C_WARNINGS"
          echo "MISRA C++ 2008 violations: $CPP_WARNINGS"
          
          # Combine MISRA warnings
          cat misra-c-2023.log misra-cpp-2008.log > misra-warnings.log 2>/dev/null || true
          MISRA_TOTAL=$(wc -l < misra-warnings.log 2>/dev/null || echo "0")
          
          if [ "$MISRA_TOTAL" -gt 0 ]; then
            echo "::warning::Found $MISRA_TOTAL MISRA violations ($C_WARNINGS C, $CPP_WARNINGS C++)"
            echo "=== MISRA VIOLATIONS ==="
            cat misra-warnings.log
          else
            echo "✅ No MISRA violations found"
          fi

      - name: Fail if mandatory or required MISRA violations exist
        if: always()
        run: |
          HIGH_COUNT=$(grep -c -E "V(25|30)[0-9][0-9]" misra-warnings.log 2>/dev/null || echo "0")
          
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "❌ Build failed: $HIGH_COUNT high severity MISRA violations must be fixed"
            exit 1
          else
            echo "✅ High severity MISRA checks passed"
            exit 0
          fi