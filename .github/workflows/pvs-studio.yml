name: PVS-Studio build analysis
on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development
  workflow_dispatch:
jobs:
  build-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: "**/cpm_modules"
          key: ${{ github.workflow }}-cpm-modules-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
      
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y wget gnupg jq
          wget -q -O - https://files.pvs-studio.com/etc/pubkey.txt \
            | sudo apt-key add -
          sudo wget -O /etc/apt/sources.list.d/viva64.list \
            https://files.pvs-studio.com/etc/viva64.list
          sudo apt update
          sudo apt install pvs-studio
          if [ -z "${{ secrets.PVS_STUDIO_CREDENTIALS }}" ]; then
            echo "PVS-Studio credentials secret (PVS_STUDIO_CREDENTIALS) is not set." >&2
            exit 1
          fi
          pvs-studio-analyzer credentials "${{ secrets.PVS_STUDIO_CREDENTIALS }}"
      
      - name: Build
        run: |
          cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=On -B build .
          cmake --build build -j4

      - name: Create scoped compilation database (source/ only)
        run: |
          jq '[.[] | select(.file | test("/source/"))]' build/compile_commands.json > build/compile_commands.project.json
          COUNT=$(jq 'length' build/compile_commands.project.json)
          echo "Scoped translation units: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "No translation units matched /source/." >&2
            exit 1
          fi
      
      - name: Analyze
        run: |
          pvs-studio-analyzer analyze \
            -f build/compile_commands.project.json \
            -j0 \
            -o pvs-studio.log \
            --analysis-mode MISRA \
            --exclude-path "${{ github.workspace }}/build/_deps" \
            --exclude-path "${{ github.workspace }}/cpm_modules" \
            --exclude-path "${{ github.workspace }}/build/CMakeFiles" \
            --rules-config misra.cfg

      - name: Convert + gate on MISRA required/mandatory
        run: |
          mkdir -p pvs-report

          set +e
          plog-converter \
            -a 'MISRA:1,2,3' \
            -t json \
            -t sarif \
            -t fullhtml \
            -o pvs-report \
            -n pvs-misra \
            -w \
            pvs-studio.log
          STATUS=$?
          set -e

          echo "PLOG_CONVERTER_EXIT_CODE=$STATUS" >> "$GITHUB_ENV"
          echo "plog-converter exit code: $STATUS"

          if [ "$STATUS" -ne 0 ] && [ "$STATUS" -ne 2 ]; then
            echo "plog-converter failed (exit code $STATUS)." >&2
            exit 1
          fi

      - name: Upload PVS-Studio artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pvs-studio-report
          path: |
            pvs-studio.log
            pvs-report/

      - name: Fail if MISRA required/mandatory violations exist
        if: always()
        run: |
          if [ "${PLOG_CONVERTER_EXIT_CODE:-0}" -eq 2 ]; then
            echo "❌ Build failed: MISRA required/mandatory violations present"
            exit 1
          fi

          echo "✅ MISRA required/mandatory gate passed"
