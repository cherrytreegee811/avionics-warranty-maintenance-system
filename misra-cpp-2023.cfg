# MISRA C++ 2008 (current PVS-Studio support)
# This covers most foundational safety rules
misra-cpp-2008=all

# Enable all rule categories
misra-cpp-2008.required=all
misra-cpp-2008.mandatory=all
misra-cpp-2008.advisory=all

# Modern C++ guidelines (C++11/14/17)
# These align with MISRA C++ 2023 principles
analysis-mode=GA:1,2,3,4

# Enable modern C++ checks
enable-all=modern

# Additional safety checks that align with MISRA 2023
enable=smart-pointers
enable=move-semantics
enable=constexpr
enable=noexcept
enable=nullptr
enable=override
